<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Топ 🏆</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/top.css" />
    
    <!-- ===== VK BRIDGE ===== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- =================== -->
</head>
<body>
    <div class="top-container">
        <!-- Шапка -->
        <div class="top-header">
            <h1>🏆 ТОП</h1>
            <button class="game-btn back-btn" id="backMenuBtn" aria-label="Меню">
                <span>🏠</span>
            </button>
            <button class="game-btn sound-btn" id="soundToggleTop">
                <span class="sound-icon">🔊</span>
            </button>
        </div>

        <!-- Строка пользователя (всегда видна) -->
        <div id="userInfoRow" class="user-info-row">
            <div class="user-info-placeholder">⏳ Загрузка...</div>
        </div>

        <!-- Таблица -->
        <div class="top-table-wrapper">
            <table class="top-table">
                <thead>
                    <tr>
                        <th class="sortable" data-sort="rank" id="sortRank">#</th>
                        <th class="sortable" data-sort="name" id="sortName">Игрок</th>
                        <th class="sortable active" data-sort="score" id="sortScore">Очки</th>
                        <th class="sortable" data-sort="combo" id="sortCombo">Комбо</th>
                        <th class="sortable" data-sort="bonus" id="sortBonus">Достижения</th>
                    </tr>
                </thead>
                <tbody id="topTableBody">
                    <tr><td colspan="5" class="top-empty">⏳ Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/pop.js"></script>
    <script src="js/vk.js"></script>
    <script src="js/top.js"></script>
</body>
</html>
