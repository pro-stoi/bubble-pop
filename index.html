<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Пузырьки 🫧</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/menu.css" />

    <!-- ===== ИНИЦИАЛИЗАЦИЯ VK BRIDGE (ПЕРЕНЕСЕНО СЮДА) ===== -->
    <script src="https://vk.com/js/api/openapi.js?169"></script>
    <script>
        const APP_ID = 54650664; // Ваш ID приложения

        if (typeof VK !== 'undefined') {
            VK.init({ apiId: APP_ID });
            VK.bridge.send('VKWebAppInit', {})
                .then(() => console.log('✅ VK Mini App инициализировано'))
                .catch((error) => console.warn('⚠️ Ошибка инициализации VK:', error));
        } else {
            console.warn('⚠️ VK Bridge не загружен');
        }
    </script>
    <!-- ====================================================== -->
</head>
<body>
    <!-- Вся остальная разметка без изменений -->
    <canvas id="menuCanvas"></canvas>

    <div class="menu-title">
        <h1>🫧</h1>
        <h2>ПУЗЫРЬКИ</h2>
    </div>

    <div class="menu-btn play-btn" id="playBtn">
        <div class="bubble-btn" style="--hue: 200;">
            <span>▶</span>
            <span class="btn-label">ИГРАТЬ</span>
        </div>
    </div>

    <div class="menu-btn challenges-btn" id="challengesBtn">
        <div class="bubble-btn" style="--hue: 280;">
            <span>🏆</span>
            <span class="btn-label">ИСПЫТАНИЯ</span>
        </div>
    </div>

    <div class="menu-btn top-btn" id="topBtn">
        <div class="bubble-btn" style="--hue: 45;">
            <span>🏆</span>
            <span class="btn-label">ТОП</span>
        </div>
    </div>

    <div class="menu-btn sound-btn" id="soundBtn">
        <div class="bubble-btn" style="--hue: 320;">
            <span id="soundIcon">🔊</span>
            <span class="btn-label" id="soundLabel">ЗВУК</span>
        </div>
    </div>

    <script src="js/bubble.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
