<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Топ 🏆</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/top.css" />
    
    <!-- ===== VK BRIDGE ===== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- =================== -->
</head>
<body>
    <div class="top-container">
        <div class="top-header">
            <h1>🏆 ТОП</h1>
            <button class="game-btn back-btn" id="backMenuBtn" aria-label="Меню">
                <span>🏠</span>
            </button>
            <button class="game-btn sound-btn" id="soundToggleTop">
                <span class="sound-icon">🔊</span>
            </button>
        </div>

        <!-- ===== СТРОКА С МОИМ МЕСТОМ (ДОБАВЛЕНА) ===== -->
        <div id="myRankRow" class="my-rank-row">
            <div class="my-rank-loading">⏳ Загрузка...</div>
        </div>

        <!-- ===== ТАБЛИЦА ===== -->
        <div class="top-table">
            <div class="top-table-header">
                <span class="col-place">#</span>
                <span class="col-name">Игрок</span>
                <span class="col-score">Очки</span>
                <span class="col-combo">Комбо</span>
                <span class="col-bonus">Достижения</span>
            </div>
            <div id="topList"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/pop.js"></script>
    <script src="js/vk.js"></script>
    <script src="js/top.js"></script>
</body>
</html>
