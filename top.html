<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Топ 🏆</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/top.css" />
    
    <!-- ===== VK BRIDGE ===== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- =================== -->
</head>
<body>
    <div class="top-container">
        <div class="top-header">
            <h1>🏆 ТОП</h1>
            <button class="game-btn back-btn" id="backMenuBtn" aria-label="Меню">
                <span>🏠</span>
            </button>
            <button id="shareTopBtn" class="share-top-btn">📤</button>
            <button class="game-btn sound-btn" id="soundToggleTop">
                <span class="sound-icon">🔊</span>
            </button>
            <button class="game-btn exit-btn" id="exitBtn" aria-label="Выйти" style="
                position: absolute;
                right: 100px;
                top: 50%;
                transform: translateY(-50%);
                width: 36px;
                height: 36px;
                border-radius: 50%;
                border: none;
                background: rgba(255,100,100,0.15);
                backdrop-filter: blur(12px);
                color: white;
                font-size: 16px;
                cursor: pointer;
                touch-action: manipulation;
            ">
                <span>🚪</span>
            </button>
        </div>

        <!-- Фильтры -->
        <div class="top-filters">
            <button class="filter-btn active" data-sort="score">По очкам</button>
            <button class="filter-btn" data-sort="combo">По комбо</button>
            <button class="filter-btn" data-sort="bonus">По достижениям</button>
        </div>

        <!-- Таблица -->
        <div class="top-table">
            <div class="top-table-header">
                <span class="col-place">#</span>
                <span class="col-name">Игрок</span>
                <span class="col-score">Очки</span>
                <span class="col-combo">Комбо</span>
                <span class="col-bonus">Достижения</span>
            </div>
            <div id="topList"></div>
        </div>

        <button id="clearTopBtn">Очистить топ</button>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/pop.js"></script>
    <script src="js/vk.js"></script>
    <script src="js/top.js"></script>
</body>
</html>
