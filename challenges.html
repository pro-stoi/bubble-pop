<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Испытания 🏆</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/challenges.css" />
    
    <!-- ===== VK BRIDGE ===== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- =================== -->
</head>
<body>
    <div class="challenges-container">
        <!-- Шапка -->
        <div class="challenges-header">
            <h1>🏆 ИСПЫТАНИЯ</h1>
            <div class="challenges-header-right">
                <span class="total-rewards" id="totalRewardsDisplay">💎 0</span>
                <button class="game-btn back-btn" id="backBtnChallenges">
                    <span>🏠</span>
                </button>
                <button class="game-btn sound-btn" id="soundToggleChallenges">
                    <span class="sound-icon">🔊</span>
                </button>
            </div>
        </div>

        <!-- Таблица -->
        <div class="challenges-table-wrapper">
            <table class="challenges-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Иконка</th>
                        <th>Название</th>
                        <th>Прогресс</th>
                        <th>Награда</th>
                        <th>Уровень</th>
                    </tr>
                </thead>
                <tbody id="challengesBody">
                    <!-- Заполняется из JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/vk.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/challenges.js"></script>
</body>
</html>
