<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Испытания 🏆</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/challenges.css" />
    
    <!-- ===== VK BRIDGE ===== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- =================== -->
</head>
<body>
    <canvas id="challengesCanvas"></canvas>

    <div class="challenges-header">
        <div id="backBtnChallenges">←</div>
        <h1>🏆 ИСПЫТАНИЯ</h1>
        <div id="soundToggleChallenges" class="sound-icon">🔊</div>
        <!-- ===== НОВАЯ КНОПКА ВЫХОДА ===== -->
        <div id="exitBtn" style="
            font-size: 22px;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            touch-action: manipulation;
            pointer-events: auto;
        ">🚪</div>
        <!-- ============================== -->
    </div>

    <div class="challenges-container" id="challengesContainer"></div>

    <div class="refresh-btn" id="refreshBtn">🔄</div>
    <button class="reset-btn" id="resetBtn" style="
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 20;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255, 80, 80, 0.2);
        border: 2px solid rgba(255, 80, 80, 0.3);
        color: #ff6b6b;
        font-size: 20px;
        cursor: pointer;
        touch-action: manipulation;
        display: flex;
        align-items: center;
        justify-content: center;
    ">🗑️</button>

    <script src="js/bubble.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/vk.js"></script>
    <script src="js/challengeTracker.js"></script>
    <script src="js/challenges.js"></script>
</body>
</html>
