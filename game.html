<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Игра 🫧</title>
    <link rel="stylesheet" href="css/style.css" />
    
    <!-- ===== VK BRIDGE ===== -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <!-- =================== -->
</head>
<body>
    <!-- ===== ИГРОВОЙ КАНВАС (ПУЗЫРЬКИ) ===== -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- ===== UI ПАНЕЛЬ (ПОВЕРХ КАНВАСА) ===== -->
    <div id="ui">
        <!-- Верхняя панель (счёт + кнопки) -->
        <div id="topBar">
            <div class="score-group">
                <div id="score">💎 0</div>
                <div id="pendingScore">+0</div>
            </div>
            
            <div class="controls-group">
                <button class="game-btn back-btn" id="backMenuBtn" aria-label="Меню">
                    <span>🏠</span>
                </button>
                <button class="game-btn sound-btn" id="soundToggleBtn" aria-label="Звук">
                    <span class="sound-icon">🔊</span>
                </button>
            </div>
            
            <div class="combo-group">
                <div id="combo">🔥 x0</div>
                <div id="multiplier">×1</div>
            </div>
        </div>

        <!-- Левая панель (бонусы) -->
        <div id="bonusContainer" class="bonus-container"></div>
    </div>

    <!-- Подсказка для бонуса -->
    <div id="bonusHint" style="display:none;">🎯 Нажми на пузырёк!</div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ПРИ ВЫХОДЕ ===== -->
    <div id="exitModal" class="exit-modal" style="display:none;">
        <div class="exit-modal-content">
            <div class="exit-modal-title">🏆 ИТОГИ ИГРЫ</div>
            <div class="exit-modal-score">
                <span class="exit-modal-label">💎 Очки</span>
                <span class="exit-modal-value" id="exitModalScore">0</span>
            </div>
            <div class="exit-modal-stats">
                <div class="exit-modal-stat">
                    <span>🔥 Комбо</span>
                    <span id="exitModalCombo">0</span>
                </div>
                <div class="exit-modal-stat">
                    <span>⚡ Множитель</span>
                    <span id="exitModalMultiplier">×1</span>
                </div>
                <div class="exit-modal-stat">
                    <span>💥 Лопнуто</span>
                    <span id="exitModalPopped">0</span>
                </div>
            </div>
            <div class="exit-modal-buttons">
                <button class="exit-modal-btn exit-modal-btn-back" id="exitModalBack">↩ Вернуться</button>
                <button class="exit-modal-btn exit-modal-btn-exit" id="exitModalExit">🚪 Выйти</button>
            </div>
        </div>
    </div>
    <!-- ===================================== -->

    <!-- ===== МОДАЛЬНОЕ ОКНО ДЛЯ РЕКЛАМЫ БОНУСА ===== -->
    <div id="bonusAdModal" class="exit-modal" style="display:none;">
        <div class="exit-modal-content" style="max-width:340px;">
            <div class="exit-modal-title" id="bonusAdModalTitle" style="font-size:20px;">🎁 Получи бонус!</div>
            <div style="padding:12px 0;color:rgba(255,255,255,0.7);font-size:15px;line-height:1.5;" id="bonusAdModalDesc">
                Посмотри рекламу и получи 1 бонус!
            </div>
            <div class="exit-modal-buttons" style="display:flex;gap:10px;margin-top:12px;">
                <button class="exit-modal-btn exit-modal-btn-back" id="bonusAdModalCancel" style="flex:1;padding:12px;font-size:14px;">
                    ❌ Отмена
                </button>
                <button class="exit-modal-btn exit-modal-btn-exit" id="bonusAdModalConfirm" style="flex:1;padding:12px;font-size:14px;background:linear-gradient(135deg,#ffcc00,#f0a500);color:#000;border-color:rgba(255,200,0,0.3);">
                    ✅ Смотреть
                </button>
            </div>
        </div>
    </div>
    <!-- ============================================== -->

    <!-- ===== СКРИПТЫ ===== -->
    <script src="js/sound.js"></script>
    <script src="js/bubble.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/bonus.js"></script>
    <script src="js/challengeTracker.js"></script>
    <script src="js/vk.js"></script>
    <script src="js/game.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/main.js"></script>

    <!-- ===== ОБРАБОТЧИКИ ДЛЯ МОДАЛКИ БОНУСА ===== -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('bonusAdModal');
        const cancelBtn = document.getElementById('bonusAdModalCancel');
        const confirmBtn = document.getElementById('bonusAdModalConfirm');
        
        // Кнопка "Отмена" — закрывает модалку
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (modal) modal.style.display = 'none';
            });
            cancelBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (modal) modal.style.display = 'none';
            });
        }
        
        // Кнопка "Смотреть" — закрывает модалку и запускает рекламу
        if (confirmBtn) {
            confirmBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (modal) modal.style.display = 'none';
                if (window.bonusManager) {
                    const type = modal.dataset.bonusType;
                    const mode = modal.dataset.mode || 'get';
                    window.bonusManager.handleBonusAdConfirm(type, mode);
                }
            });
            confirmBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (modal) modal.style.display = 'none';
                if (window.bonusManager) {
                    const type = modal.dataset.bonusType;
                    const mode = modal.dataset.mode || 'get';
                    window.bonusManager.handleBonusAdConfirm(type, mode);
                }
            });
        }
        
        // Закрытие по клику на фон
        if (modal) {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
    });
    </script>
</body>
</html>
